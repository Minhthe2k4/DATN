spring.application.name=DATN
# Database connection
spring.datasource.url=jdbc:mysql://localhost:3305/vocab_learning?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# Đặt mật khẩu DB thực của bạn ở đây (không commit lên git)
spring.datasource.password=YOUR_DB_PASSWORD_HERE
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Use manual SQL migrations; avoid Hibernate auto-DDL to prevent FK conflicts.
spring.jpa.hibernate.ddl-auto=none

server.port=8080

# Return concise API errors without stack traces.
server.error.include-stacktrace=never
server.error.include-message=always

# Optional: enable AI condensation + context meaning selection in reading dictionary lookup.
# Đặt OpenAI API key thực của bạn ở đây (không commit lên git)
datn.ai.openai-api-key=YOUR_OPENAI_API_KEY_HERE
datn.ai.openai-model=gpt-4o-mini

# Dictionary provider for reading lookup (freedictionary or oxford)
# (DEPRECATED: now using AI exclusively for reading)

# VNPAY Sandbox configuration
vnpay.tmn-code=DUMMY_TMN_CODE
vnpay.hash-secret=DUMMY_HASH_SECRET_KEY_FOR_TESTING_123
vnpay.vnp-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.vnp-return-url=http://localhost:5173/payment-result
