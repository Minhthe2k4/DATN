# Cấu hình dành riêng cho môi trường Deploy (Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

datn.ai.openai-api-key=${OPENAI_API_KEY}
app.frontend.url=${APP_FRONTEND_URL}
zalopay.redirect-url=${ZALOPAY_REDIRECT_URL}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Tool paths in Linux (Docker)
datn.tool.yt-dlp=/usr/local/bin/yt-dlp
datn.tool.ffmpeg=/usr/bin/ffmpeg
server.port=${PORT:10000}
server.address=0.0.0.0

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.devtools.restart.enabled=false
spring.main.banner-mode=off
logging.level.org.springframework.boot=INFO
logging.level.com.example.DATN=DEBUG

spring.jpa.open-in-view=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
